services:
  postgres:
    image: postgres:16-alpine
    container_name: lcw-docs-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-lcw_docs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-lcw_docs}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lcw_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: lcw-docs-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-lcw_docs}
      DB_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-lcw_docs}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      NODE_ENV: production
      DB_SYNCHRONIZE: "false"
    ports:
      - "8082:8082"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  web:
    build:
      context: /home/deploy/lcw-docs
      dockerfile: apps/web/Dockerfile
    container_name: lcw-docs-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
