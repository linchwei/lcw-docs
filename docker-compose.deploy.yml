services:
  postgres:
    image: postgres:16-alpine
    container_name: lcw-docs-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-lcw_docs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-lcw_docs}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lcw_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  server:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-github-username/lcw-docs}/server:${IMAGE_TAG:-latest}
    container_name: lcw-docs-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-lcw_docs}
      DB_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-lcw_docs}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      NODE_ENV: production
    ports:
      - "8082:8082"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-github-username/lcw-docs}/web:${IMAGE_TAG:-latest}
    container_name: lcw-docs-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    container_name: lcw-docs-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - server
    ports:
      - "127.0.0.1:9090:9090"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: lcw-docs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  internal:
